<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Teaching Assistant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8f9fa;
      color: #1a1a1a;
      min-width: 300px;
    }

    .header {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 16px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .header-text {
      flex: 1;
      min-width: 0;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
    }

    .header p {
      font-size: 12px;
      color: #6b7280;
      margin-top: 2px;
    }

    .header-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .icon-btn {
      width: 30px;
      height: 30px;
      border: 1px solid #e5e7eb;
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      color: #6b7280;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-family: inherit;
    }

    .icon-btn:hover {
      border-color: #3b82f6;
      color: #3b82f6;
    }

    .icon-btn:active {
      transform: scale(0.92);
    }

    .refresh-glyph {
      display: inline-block;
    }

    .icon-btn.spinning {
      pointer-events: none;
      opacity: 0.6;
    }

    .icon-btn.spinning svg,
    .icon-btn.spinning .refresh-glyph {
      animation: spin 0.8s linear infinite;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #e5e7eb;
      border-top-color: #3b82f6;
      border-radius: 50%;
      margin: 0 auto 12px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .user-info {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #3b82f6;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .user-details .name {
      font-size: 14px;
      font-weight: 600;
    }

    .user-details .dept {
      font-size: 12px;
      color: #6b7280;
    }

    .section-title {
      padding: 12px 16px 8px;
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .course-list {
      padding: 0 8px 8px;
    }

    .sync-warning {
      margin: 8px;
      padding: 12px;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 10px;
      color: #92400e;
      font-size: 12px;
      line-height: 1.5;
    }

    .sync-warning strong {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
      color: #78350f;
    }

    .sync-warning ul {
      margin-top: 6px;
      padding-left: 16px;
    }

    .sync-warning li {
      margin-top: 2px;
      word-break: break-word;
    }

    .course-item {
      display: block;
      width: 100%;
      text-align: left;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      font-size: 14px;
    }

    .course-item:hover {
      border-color: #3b82f6;
      box-shadow: 0 1px 4px rgba(59, 130, 246, 0.15);
    }

    .course-item:active {
      transform: scale(0.98);
    }

    .course-item .course-name {
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1.4;
    }

    .course-item .course-meta {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 2px;
    }

    .course-item .course-status {
      font-size: 11px;
      font-weight: 500;
      margin-top: 6px;
      padding: 2px 8px;
      border-radius: 4px;
      display: inline-block;
    }

    .course-status.active {
      background: #dbeafe;
      color: #2563eb;
    }

    .course-status.submitted {
      background: #dcfce7;
      color: #16a34a;
    }

    .course-status.inactive {
      background: #f3f4f6;
      color: #9ca3af;
    }

    .course-item.disabled {
      opacity: 0.6;
      cursor: default;
    }

    .course-item.disabled:hover {
      border-color: #e5e7eb;
      box-shadow: none;
    }

    .status {
      padding: 40px 16px;
      text-align: center;
    }

    .status.loading {
      color: #6b7280;
    }

    .status.error {
      color: #ef4444;
    }

    .status .icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .status .message {
      font-size: 14px;
      line-height: 1.5;
    }

    .retry-btn {
      margin-top: 12px;
      padding: 8px 16px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }

    .retry-btn:hover {
      background: #2563eb;
    }

    .server-config {
      padding: 12px 16px;
      border-bottom: 1px solid #e5e7eb;
      background: #f3f4f6;
    }

    .server-config.hidden {
      display: none;
    }

    .server-config label {
      font-size: 11px;
      color: #6b7280;
      display: block;
      margin-bottom: 4px;
    }

    .server-config input {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 12px;
      font-family: monospace;
    }

    .error-detail {
      margin-top: 10px;
      text-align: left;
      font-size: 12px;
    }

    .error-detail summary {
      cursor: pointer;
      color: #9ca3af;
      font-size: 12px;
    }

    .error-detail pre {
      margin-top: 6px;
      padding: 8px 10px;
      background: #f3f4f6;
      border-radius: 6px;
      color: #6b7280;
      font-size: 11px;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-text">
      <h1>AI Teaching Assistant</h1>
      <p>e-class 수강 과목 강의 피드백</p>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="refresh-btn" title="새로고침" aria-label="새로고침">
        <span class="refresh-glyph">⟳</span>
      </button>
      <button class="icon-btn" id="settings-btn" title="설정" aria-label="설정">⚙</button>
    </div>
  </div>

  <div class="server-config hidden" id="server-config">
    <label>서버 주소 (고급 설정)</label>
    <input
      type="text"
      id="server-url"
      value="http://localhost:3000"
      placeholder="http://localhost:3000"
    />
  </div>

  <div id="user-section" class="user-info" style="display: none">
    <div class="user-avatar" id="user-avatar"></div>
    <div class="user-details">
      <div class="name" id="user-name"></div>
      <div class="dept" id="user-dept"></div>
    </div>
  </div>

  <div id="content">
    <div class="status loading">
      <div class="spinner"></div>
      <div class="message">e-class에서 정보를 불러오는 중</div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
