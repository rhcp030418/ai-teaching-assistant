<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Teaching Assistant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8f9fa;
      color: #1a1a1a;
      min-width: 300px;
    }

    .header {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 16px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
    }

    .header p {
      font-size: 12px;
      color: #6b7280;
      margin-top: 2px;
    }

    .user-info {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #3b82f6;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .user-details .name {
      font-size: 14px;
      font-weight: 600;
    }

    .user-details .dept {
      font-size: 12px;
      color: #6b7280;
    }

    .section-title {
      padding: 12px 16px 8px;
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .course-list {
      padding: 0 8px 8px;
    }

    .sync-warning {
      margin: 8px;
      padding: 12px;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 10px;
      color: #92400e;
      font-size: 12px;
      line-height: 1.5;
    }

    .sync-warning strong {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
      color: #78350f;
    }

    .sync-warning ul {
      margin-top: 6px;
      padding-left: 16px;
    }

    .sync-warning li {
      margin-top: 2px;
      word-break: break-word;
    }

    .course-item {
      display: block;
      width: 100%;
      text-align: left;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      font-size: 14px;
    }

    .course-item:hover {
      border-color: #3b82f6;
      box-shadow: 0 1px 4px rgba(59, 130, 246, 0.15);
    }

    .course-item:active {
      transform: scale(0.98);
    }

    .course-item .course-name {
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1.4;
    }

    .course-item .course-meta {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 2px;
    }

    .course-item .course-status {
      font-size: 11px;
      font-weight: 500;
      margin-top: 6px;
      padding: 2px 8px;
      border-radius: 4px;
      display: inline-block;
    }

    .course-status.active {
      background: #dbeafe;
      color: #2563eb;
    }

    .course-status.submitted {
      background: #dcfce7;
      color: #16a34a;
    }

    .course-status.inactive {
      background: #f3f4f6;
      color: #9ca3af;
    }

    .course-item.disabled {
      opacity: 0.6;
      cursor: default;
    }

    .course-item.disabled:hover {
      border-color: #e5e7eb;
      box-shadow: none;
    }

    .status {
      padding: 40px 16px;
      text-align: center;
    }

    .status.loading {
      color: #6b7280;
    }

    .status.error {
      color: #ef4444;
    }

    .status .icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .status .message {
      font-size: 14px;
      line-height: 1.5;
    }

    .retry-btn {
      margin-top: 12px;
      padding: 8px 16px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }

    .retry-btn:hover {
      background: #2563eb;
    }

    .server-config {
      padding: 12px 16px;
      border-top: 1px solid #e5e7eb;
      background: #fff;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
    }

    .server-config label {
      font-size: 11px;
      color: #6b7280;
      display: block;
      margin-bottom: 4px;
    }

    .server-config input {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 12px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>AI Teaching Assistant</h1>
    <p>e-class 수강 과목 강의 피드백</p>
  </div>

  <div id="user-section" class="user-info" style="display: none">
    <div class="user-avatar" id="user-avatar"></div>
    <div class="user-details">
      <div class="name" id="user-name"></div>
      <div class="dept" id="user-dept"></div>
    </div>
  </div>

  <div id="content">
    <div class="status loading">
      <div class="icon">...</div>
      <div class="message">e-class에서 정보를 불러오는 중</div>
    </div>
  </div>

  <div class="server-config">
    <label>서버 주소</label>
    <input
      type="text"
      id="server-url"
      value="http://localhost:3000"
      placeholder="http://localhost:3000"
    />
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
